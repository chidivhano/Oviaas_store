<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soweto Run | Obvious Studios</title>
    <!-- Phaser 3 Framework -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            overflow: hidden;
            touch-action: none;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            background: #ff3366;
            color: white;
            border: 4px solid white;
            border-radius: 0px;
            font-family: 'Impact';
            box-shadow: 10px 10px 0px #000;
            transition: transform 0.1s;
        }

        #start-btn:active {
            transform: translate(5px, 5px);
            box-shadow: 5px 5px 0px #000;
        }
    </style>
</head>

<body>

    <div id="game-container" style="display: none;"></div>

    <div id="ui-overlay">
        <h1 style="color: white; font-size: 64px; letter-spacing: 2px; margin-bottom: 0;">SOWETO RUN</h1>
        <p style="color: #aaa; margin-bottom: 40px; font-family: Arial, sans-serif;">OBVIOUS STUDIOS PREVENTATIVE MAINTENANCE</p>
        <button id="start-btn" onclick="openSowetoRun(); document.getElementById('ui-overlay').style.display='none';">
            HUSTLE NOW
        </button>
    </div>

    <!-- Modular Game Script -->
    <script type="module" src="js/main.js"></script>

</body>

</html>
